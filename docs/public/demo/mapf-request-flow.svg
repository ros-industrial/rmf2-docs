<?xml version="1.0" encoding="UTF-8"?>
<!--
  MAPF "Request -> plan -> execute" flow.
  Hand-authored, editable SVG (open in Inkscape/Figma or edit the markup directly).
  Conceptual source of truth: ./mapf-request-flow.mmd  (kept in sync by hand).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8b8b98"/>
    </marker>
    <style>
      .panel { fill:#1b1b21; stroke:#30303a; stroke-width:1; }
      .sg    { fill:#24242c; stroke:#3d3d48; stroke-width:1.2; }
      .sgt   { fill:#9a9aa8; font-size:13px; font-weight:600; text-anchor:middle; }
      .node  { fill:#313139; stroke:#565663; stroke-width:1.3; }
      .stad  { fill:#2b3140; stroke:#4a5168; stroke-width:1.3; }
      .cyl   { fill:#382b30; stroke:#6b515b; stroke-width:1.3; }
      .t     { fill:#ececf1; font-size:13px; font-weight:600; text-anchor:middle; }
      .tsm   { fill:#ececf1; font-size:12px; font-weight:600; text-anchor:middle; }
      .ts    { fill:#b6b6c2; font-size:11px; text-anchor:middle; }
      .edge  { fill:none; stroke:#8b8b98; stroke-width:1.4; }
      .edot  { fill:none; stroke:#8b8b98; stroke-width:1.4; stroke-dasharray:5 4; }
      .el    { fill:#d6d6de; font-size:11px; text-anchor:middle; }
      .elbg  { fill:#1b1b21; }
    </style>
  </defs>

  <rect class="panel" x="10" y="10" width="1160" height="560" rx="12"/>

  <!-- ============ subgraphs ============ -->
  <rect class="sg" x="160" y="150" width="250" height="270" rx="10"/>
  <text class="sgt" x="285" y="173">1 · Submit</text>

  <rect class="sg" x="600" y="95" width="400" height="335" rx="10"/>
  <text class="sgt" x="800" y="118">2–4 · Plan · Compile · Execute</text>

  <!-- ============ edges (drawn under nodes) ============ -->
  <!-- client -> mrs / fmrs -->
  <path class="edge" d="M120,283 L173,214" marker-end="url(#arw)"/>
  <path class="edge" d="M120,297 L173,352" marker-end="url(#arw)"/>
  <!-- mrs / fmrs -> queue -->
  <path class="edge" d="M395,217 L440,271" marker-end="url(#arw)"/>
  <path class="edge" d="M395,353 L440,301" marker-end="url(#arw)"/>
  <!-- queue -> exec -->
  <path class="edge" d="M528,287 L616,302" marker-end="url(#arw)"/>
  <!-- exec <-> solver -->
  <path class="edge" d="M720,280 L800,197" marker-end="url(#arw)"/>
  <path class="edge" d="M900,197 L772,280" marker-end="url(#arw)"/>
  <!-- exec self-loop: build ADG -->
  <path class="edge" d="M770,293 C815,283 815,330 770,320" marker-end="url(#arw)"/>
  <!-- exec -> robots (dispatch) -->
  <path class="edge" d="M772,308 L1023,372" marker-end="url(#arw)"/>
  <!-- robots -> exec (progress) -->
  <path class="edot" d="M1023,398 L774,326" marker-end="url(#arw)"/>
  <!-- exec -> status (update) -->
  <path class="edot" d="M720,330 C770,432 905,455 1050,460" marker-end="url(#arw)"/>

  <!-- ============ edge labels ============ -->
  <g class="el">
    <rect class="elbg" x="130" y="232" width="34" height="15" rx="3"/><text x="147" y="243">REST</text>
    <rect class="elbg" x="124" y="324" width="48" height="15" rx="3"/><text x="148" y="335">FIWARE</text>
    <rect class="elbg" x="540" y="271" width="68" height="15" rx="3"/><text x="574" y="282">① pull batch</text>
    <rect class="elbg" x="690" y="221" width="84" height="15" rx="3"/><text x="732" y="232">② request plan</text>
    <rect class="elbg" x="812" y="241" width="78" height="15" rx="3"/><text x="851" y="252">timestep steps</text>
    <rect class="elbg" x="828" y="299" width="68" height="15" rx="3"/><text x="862" y="310">③ build ADG</text>
    <rect class="elbg" x="828" y="326" width="132" height="15" rx="3"/><text x="894" y="337">④ dispatch ready actions</text>
    <rect class="elbg" x="906" y="356" width="52" height="15" rx="3"/><text x="932" y="367">progress</text>
    <rect class="elbg" x="812" y="436" width="86" height="15" rx="3"/><text x="855" y="447">⑤ update status</text>
  </g>

  <!-- ============ nodes ============ -->
  <!-- client -->
  <rect class="stad" x="30" y="265" width="90" height="50" rx="25"/>
  <text class="t" x="75" y="294">Client</text>

  <!-- movement_request_server -->
  <rect class="node" x="175" y="190" width="220" height="54" rx="6"/>
  <text class="tsm" x="285" y="212">movement_request_server</text>
  <text class="ts"  x="285" y="229">REST :8009</text>

  <!-- mapf_mrs -->
  <rect class="node" x="175" y="326" width="220" height="54" rx="6"/>
  <text class="t"  x="285" y="348">mapf_mrs</text>
  <text class="ts" x="285" y="365">FIWARE TaskRequest</text>

  <!-- redis queue (cylinder) -->
  <path class="cyl" d="M432,260 V320 A48,10 0 0 0 528,320 V260 A48,10 0 0 1 432,260 Z"/>
  <ellipse class="cyl" cx="480" cy="260" rx="48" ry="10"/>
  <text class="tsm" x="480" y="289">Redis queue</text>
  <text class="ts"  x="480" y="305">mapf_tasks</text>

  <!-- adg_executor -->
  <rect class="node" x="620" y="280" width="150" height="50" rx="6"/>
  <text class="t" x="695" y="309">adg_executor</text>

  <!-- mapf_solver -->
  <rect class="node" x="775" y="140" width="180" height="56" rx="6"/>
  <text class="t"  x="865" y="163">mapf_solver</text>
  <text class="ts" x="865" y="180">ECBS :8888</text>

  <!-- robots -->
  <rect class="stad" x="1025" y="355" width="130" height="52" rx="26"/>
  <text class="t"  x="1090" y="377">Robots</text>
  <text class="ts" x="1090" y="394">VDA5050 orders</text>

  <!-- redis task status (cylinder) -->
  <path class="cyl" d="M1020,462 V562 A70,10 0 0 0 1160,562 V462 A70,10 0 0 1 1020,462 Z"/>
  <ellipse class="cyl" cx="1090" cy="462" rx="70" ry="10"/>
  <text class="tsm" x="1090" y="486">Redis</text>
  <text class="ts"  x="1090" y="503">task status</text>
  <text class="ts"  x="1090" y="521">QUEUED · IN_PROGRESS</text>
  <text class="ts"  x="1090" y="539">COMPLETED · FAILED</text>
</svg>
